<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday Abdullah!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="intro">

    <div class="intro-container">

        <h1 class="intro-title">
            Happy Birthday! 🎂

        <p class="subtitle">

        </form>

    </div>

</body>

</html>
